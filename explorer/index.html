<style>
  :root {
    --navy: #0f1f3d;
    --navy-mid: #162847;
    --navy-light: #1e3460;
    --teal: #0d9488;
    --teal-light: #14b8a6;
    --gold: #f59e0b;
    --gold-light: #fbbf24;
    --cream: #fef9f0;
    --text-light: #e2e8f0;
    --text-muted: #94a3b8;
    --radius: 14px;
    --radius-sm: 8px;
    --panel-width: 400px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text-light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  /* ── NAV ── */
  nav {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 1.5rem;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .nav-logo {
    display:flex; align-items:center; gap:0.5rem;
    text-decoration:none;
  }
  .nav-logo-icon {
    width:32px; height:32px; background:var(--teal);
    border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .nav-logo-text {
    font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700;
    color:var(--cream);
  }
  .nav-logo-text span { color:var(--teal-light); }
  .nav-back {
    font-size:0.82rem; color:var(--text-muted); text-decoration:none;
    display:flex; align-items:center; gap:0.3rem;
    transition:color 0.15s;
  }
  .nav-back:hover { color:var(--teal-light); }

  /* ── PAGE HEADER ── */
  .page-header {
    position:relative; z-index:1;
    padding:2rem 1.5rem 1.5rem;
    max-width:1200px; margin:0 auto;
  }
  .page-header h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.8rem,4vw,2.6rem);
    font-weight:900; color:var(--cream);
    margin-bottom:0.3rem;
  }
  .page-header p { font-size:0.92rem; color:var(--text-muted); }

  /* ── CONTROLS ── */
  .controls {
    position:relative; z-index:1;
    max-width:1200px; margin:0 auto;
    padding:0 1.5rem 1.5rem;
    display:flex; flex-direction:column; gap:1rem;
  }

  .search-wrap {
    position:relative;
  }
  .search-icon {
    position:absolute; left:1rem; top:50%; transform:translateY(-50%);
    color:var(--text-muted); pointer-events:none; font-size:1rem;
  }
  #search {
    width:100%; padding:0.75rem 1rem 0.75rem 2.8rem;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius-sm);
    color:var(--text-light); font-family:'DM Sans',sans-serif; font-size:0.95rem;
    outline:none; transition:border-color 0.2s;
  }
  #search::placeholder { color:var(--text-muted); }
  #search:focus { border-color:var(--teal-light); }

  .filter-row {
    display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;
  }
  .filter-label {
    font-size:0.75rem; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--text-muted); margin-right:0.3rem;
  }
  .filter-btn {
    padding:0.4rem 0.9rem;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:100px; color:var(--text-muted);
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500;
    cursor:pointer; transition:all 0.15s; white-space:nowrap;
  }
  .filter-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text-light); }
  .filter-btn.active {
    background:var(--teal); border-color:var(--teal);
    color:#fff; font-weight:600;
  }

  .results-count {
    font-size:0.8rem; color:var(--text-muted);
    margin-left:auto; white-space:nowrap;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    position:relative; z-index:1;
    max-width:1200px; margin:0 auto;
    padding:0 1.5rem 4rem;
    display:flex; gap:1.5rem; align-items:flex-start;
  }

  /* ── FLAG GRID ── */
  .grid-wrap { flex:1; min-width:0; }

  .flags-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap:0.9rem;
  }

  .flag-card {
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:var(--radius);
    overflow:hidden; cursor:pointer;
    transition:transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    animation: pop-in 0.3s ease both;
  }
  .flag-card:hover {
    transform:translateY(-3px) scale(1.02);
    border-color:rgba(20,184,166,0.4);
    background:rgba(255,255,255,0.08);
  }
  .flag-card.active {
    border-color:var(--teal-light);
    box-shadow:0 0 0 2px rgba(20,184,166,0.25);
  }

  @keyframes pop-in {
    from { opacity:0; transform:scale(0.92); }
    to   { opacity:1; transform:scale(1); }
  }

  .flag-img-wrap {
    width:100%; aspect-ratio:3/2; overflow:hidden;
    background:rgba(255,255,255,0.03);
    display:flex; align-items:center; justify-content:center;
  }
  .flag-img-wrap img {
    width:100%; height:100%; object-fit:cover; display:block;
    transition:transform 0.3s ease;
  }
  .flag-card:hover .flag-img-wrap img { transform:scale(1.05); }

  .flag-card-label {
    padding:0.55rem 0.65rem;
  }
  .flag-card-name {
    font-size:0.78rem; font-weight:600; color:var(--text-light);
    line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .flag-card-capital {
    font-size:0.68rem; color:var(--text-muted); margin-top:0.15rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .no-results {
    grid-column:1/-1; text-align:center; padding:3rem 1rem;
    color:var(--text-muted); font-size:0.95rem;
  }
  .no-results span { display:block; font-size:2.5rem; margin-bottom:0.7rem; }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    width:var(--panel-width);
    background:var(--navy-mid);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius);
    position:sticky; top:1.5rem;
    overflow:hidden;
    opacity:0; pointer-events:none;
    transform:translateX(20px);
    transition:opacity 0.25s ease, transform 0.25s ease;
    flex-shrink:0;
  }
  .detail-panel.visible {
    opacity:1; pointer-events:all;
    transform:translateX(0);
  }

  .panel-flag-wrap {
    width:100%; aspect-ratio:3/2; overflow:hidden;
    background:rgba(0,0,0,0.3);
    position:relative;
  }
  .panel-flag-wrap img {
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .panel-close {
    position:absolute; top:0.75rem; right:0.75rem;
    width:32px; height:32px; border-radius:50%;
    background:rgba(0,0,0,0.5); border:none; color:#fff;
    font-size:1rem; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
    transition:background 0.15s;
  }
  .panel-close:hover { background:rgba(0,0,0,0.8); }

  .panel-body { padding:1.4rem; }

  .panel-continent {
    font-size:0.7rem; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--teal-light); margin-bottom:0.3rem;
  }
  .panel-name {
    font-family:'Playfair Display',serif;
    font-size:1.7rem; font-weight:900; color:var(--cream);
    line-height:1.1; margin-bottom:0.25rem;
  }
  .panel-capital {
    font-size:0.85rem; color:var(--text-muted); margin-bottom:1.2rem;
    display:flex; align-items:center; gap:0.3rem;
  }

  .panel-section { margin-bottom:1.2rem; }
  .panel-section-label {
    font-size:0.7rem; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--text-muted);
    margin-bottom:0.4rem; display:flex; align-items:center; gap:0.4rem;
  }
  .panel-section-label::after {
    content:''; flex:1; height:1px;
    background:rgba(255,255,255,0.08);
  }
  .panel-text {
    font-size:0.88rem; color:var(--text-light); line-height:1.65;
  }

  .panel-tags {
    display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:1rem;
  }
  .panel-tag {
    font-size:0.7rem; padding:0.2rem 0.6rem;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:100px; color:var(--text-muted);
  }

  .panel-pop {
    display:flex; align-items:baseline; gap:0.4rem; margin-bottom:1.2rem;
  }
  .panel-pop-num {
    font-family:'Playfair Display',serif;
    font-size:1.3rem; font-weight:700; color:var(--gold);
  }
  .panel-pop-label { font-size:0.78rem; color:var(--text-muted); }

  /* ── MOBILE DRAWER ── */
  @media (max-width:900px) {
    .detail-panel {
      position:fixed; bottom:0; left:0; right:0; top:auto;
      width:100%; max-height:85vh; overflow-y:auto;
      border-radius:var(--radius) var(--radius) 0 0;
      transform:translateY(100%);
      z-index:100;
    }
    .detail-panel.visible { transform:translateY(0); }

    .panel-overlay {
      display:block;
      position:fixed; inset:0;
      background:rgba(0,0,0,0.6);
      z-index:99;
      opacity:0; pointer-events:none;
      transition:opacity 0.25s;
    }
    .panel-overlay.visible { opacity:1; pointer-events:all; }
  }

  @media (min-width:901px) {
    .panel-overlay { display:none; }
  }
  footer { position:relative; z-index:1; text-align:center; padding:1.5rem; border-top:1px solid rgba(255,255,255,0.06); color:var(--text-muted); font-size:0.8rem; margin-top:2rem; }
  footer a { color:var(--teal-light); text-decoration:none; }
</style>
</head>

<script>
const COUNTRIES = [
  { code:"gb", name:"United Kingdom", capital:"London", continent:"Europe", population:67000000, funFact:"The UK drives on the left side of the road, a tradition dating back to the days of sword-carrying travellers.", symbolism:"The Union Jack combines the crosses of St George (England), St Andrew (Scotland), and St Patrick (Ireland).", tags:["island", "monarchy"] },
  { code:"fr", name:"France", capital:"Paris", continent:"Europe", population:68000000, funFact:"France is the most visited country in the world, welcoming over 90 million tourists a year.", symbolism:"The tricolore's blue represents freedom, white stands for equality, and red symbolises brotherhood.", tags:["tricolore", "monarchy"] },
  { code:"de", name:"Germany", capital:"Berlin", continent:"Europe", population:84000000, funFact:"Germany has over 1,500 different types of beer and around 1,300 breweries.", symbolism:"Black, red, and gold are the colours of the German democratic movement dating from the early 19th century.", tags:["tricolore"] },
  { code:"it", name:"Italy", capital:"Rome", continent:"Europe", population:60000000, funFact:"Italy has more UNESCO World Heritage Sites than any other country in the world.", symbolism:"The green, white, and red tricolore was inspired by the French flag during Napoleon's Italian campaign.", tags:["tricolore"] },
  { code:"es", name:"Spain", capital:"Madrid", continent:"Europe", population:47000000, funFact:"Spain is home to La Tomatina, a festival where thousands of people throw tomatoes at each other.", symbolism:"The red and yellow colours date back to the old kingdoms of Castile and Aragon. The coat of arms shows Spain's history.", tags:["coat of arms", "monarchy"] },
  { code:"pt", name:"Portugal", capital:"Lisbon", continent:"Europe", population:10000000, funFact:"Portugal is the oldest country in Europe with unchanged borders, established in 1139.", symbolism:"Green represents hope and the future, red symbolises the blood of those who died for the country. The armillary sphere reflects Portugal's age of exploration.", tags:["coat of arms"] },
  { code:"nl", name:"Netherlands", capital:"Amsterdam", continent:"Europe", population:17000000, funFact:"The Netherlands has more bicycles than people — about 23 million bikes for 17 million people!", symbolism:"Orange was originally used but faded to red over time. The flag inspired many others, including France's tricolore.", tags:["tricolore"] },
  { code:"be", name:"Belgium", capital:"Brussels", continent:"Europe", population:11000000, funFact:"Belgium invented French fries — despite the name, they originated in Belgium in the late 17th century.", symbolism:"Black, yellow, and red come from the coat of arms of the Duchy of Brabant.", tags:["tricolore"] },
  { code:"ch", name:"Switzerland", capital:"Bern", continent:"Europe", population:8700000, funFact:"Switzerland has four official languages: German, French, Italian, and Romansh.", symbolism:"One of only two square national flags in the world. The white cross on red has been used since the 14th century.", tags:["cross", "square"] },
  { code:"at", name:"Austria", capital:"Vienna", continent:"Europe", population:9000000, funFact:"Austria is the birthplace of Mozart, Freud, and the croissant.", symbolism:"Legend says the red-white-red design came from a duke's blood-soaked tunic after battle, with a clean strip where his belt had been.", tags:["tricolore"] },
  { code:"se", name:"Sweden", capital:"Stockholm", continent:"Europe", population:10000000, funFact:"Sweden has around 221,800 islands, making it one of the most island-rich countries in the world.", symbolism:"The Nordic cross design represents Christianity. The blue and yellow come from the Swedish coat of arms.", tags:["nordic cross"] },
  { code:"no", name:"Norway", capital:"Oslo", continent:"Europe", population:5400000, funFact:"Norway has the midnight sun — in summer, the sun never fully sets above the Arctic Circle.", symbolism:"The red, white, and blue Nordic cross reflects Norway's ties to Denmark and Sweden.", tags:["nordic cross"] },
  { code:"dk", name:"Denmark", capital:"Copenhagen", continent:"Europe", population:5900000, funFact:"Denmark is considered the happiest country in the world in many surveys.", symbolism:"The Dannebrog is the oldest national flag in the world, supposedly fallen from the sky in 1219 during a battle in Estonia.", tags:["nordic cross", "oldest flag"] },
  { code:"fi", name:"Finland", capital:"Helsinki", continent:"Europe", population:5500000, funFact:"Finland has more saunas than cars — about 3 million saunas for a population of 5.5 million.", symbolism:"The blue Nordic cross represents the country's many lakes and the sky. White symbolises the snow-covered landscape.", tags:["nordic cross"] },
  { code:"is", name:"Iceland", capital:"Reykjavik", continent:"Europe", population:370000, funFact:"Iceland has no mosquitoes — the climate is too cold for them to survive.", symbolism:"The blue represents the mountains, white is for the ice and snow, and red stands for the volcanic fires beneath the surface.", tags:["nordic cross"] },
  { code:"ie", name:"Ireland", capital:"Dublin", continent:"Europe", population:5000000, funFact:"Halloween originated in Ireland from the ancient Celtic festival of Samhain.", symbolism:"Green represents the Catholic Irish, orange represents the Protestant Irish, and white in the middle symbolises peace between them.", tags:["tricolore"] },
